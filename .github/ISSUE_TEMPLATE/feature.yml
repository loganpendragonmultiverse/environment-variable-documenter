name: Feature request
description: Propose a focused syntax or reporting addition
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem and users }
    validations: { required: true }
  - type: textarea
    id: syntax
    attributes: { label: Exact syntax and false-positive boundary }
    validations: { required: true }
  - type: textarea
    id: validation
    attributes: { label: Proposed validation }
    validations: { required: true }

